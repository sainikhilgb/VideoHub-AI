version: '3.8'

services:
  api:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: videohub-ai-api
    ports:
      - "8000:8000"
    volumes:
      - ./ai:/app
    environment:
      - PYTHONUNBUFFERED=1
    # Adding a basic health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: videohub-web
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.ts:/app/vite.config.ts
      # Prevent local node_modules from overwriting container's
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
