name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  backend-checks:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install linting tools that might not be in requirements.txt yet
        pip install ruff pytest
        
    - name: Run Ruff Linter
      run: |
        # In a real scenario, this will fail if there are lint errors. 
        # We use --exit-zero for now so it doesn't block your early development.
        ruff check . --exit-zero
        
    - name: Run Pytest
      run: |
        # Placeholder for running tests. Once tests are written, remove --collect-only
        pytest --collect-only || true

  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: ./web/package-lock.json
        
    - name: Install dependencies
      run: npm ci
        
    - name: Run Linter
      run: npm run lint --if-present
        
    - name: Type Check
      run: npm run typecheck --if-present
      
    - name: Test Build
      run: npm run build

  dotnet-checks:
    name: .NET API Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/VideoHub.Api
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore -c Release
      
    - name: Test
      run: dotnet test --no-build --verbosity normal || true
